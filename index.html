<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Fit & Loadout Organizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<aside class="sidebar">
<h2>Categories</h2>
<div id="categories"></div>
</aside>

<main class="main">

<header>

<div class="tabs">
<button id="fitsTab" class="tab active">Fits</button>
<button id="loadoutsTab" class="tab">Loadouts</button>
</div>

<input id="search" placeholder="Search...">

</header>

<section id="fits"></section>

<section class="add">

<h3 id="addTitle">Add Fit</h3>

<input id="name" placeholder="Name">
<input id="category" placeholder="Category">
<input id="tags" placeholder="Tags (comma separated)">

<textarea id="cmd" rows="3" placeholder="!shirt 123 | !hat 456"></textarea>

<button id="saveBtn">Save</button>

</section>

</main>

</div>

<script src="index.js"></script>

</body>
</html>
