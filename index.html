<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fit Organizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<aside class="sidebar">
<h2>Categories</h2>
<div id="categories"></div>
</aside>

<main class="main">

<header>
<input id="search" placeholder="Search fits...">
</header>

<section id="fits"></section>

<section class="add">
<h3>Add Fit</h3>

<input id="name" placeholder="Fit name">
<input id="category" placeholder="Category">
<input id="tags" placeholder="Tags (comma separated)">

<textarea id="cmd" rows="3" placeholder="!shirt 123 | !hat 456"></textarea>

<button id="saveBtn">Save Fit</button>
</section>

</main>

</div>

<script src="index.js"></script>
</body>
</html>
